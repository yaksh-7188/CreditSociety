<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credit Society - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 420px;
            max-width: 95%;
        }
        .logo {
            text-align: center;
            margin-bottom: 28px;
        }
        .logo h2 {
            color: #667eea;
            font-size: 30px;
            font-weight: 700;
        }
        .logo p {
            color: #888;
            font-size: 13px;
            margin-top: 4px;
        }
        .role-selector {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-bottom: 28px;
        }
        .role-option {
            flex: 1;
            max-width: 160px;
        }
        .role-option input[type="radio"] {
            display: none;
        }
        .role-option label {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            padding: 10px 16px;
            border-radius: 10px;
            border: 2px solid #e0e0e0;
            transition: all 0.3s;
            font-weight: 500;
            color: #666;
            width: 100%;
            user-select: none;
        }
        .role-option input[type="radio"]:checked + label {
            border-color: #667eea;
            background: #f0f1ff;
            color: #667eea;
        }
        .role-option label:hover {
            border-color: #667eea;
            background: #f9f9ff;
        }
        .form-group {
            margin-bottom: 18px;
            position: relative;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #444;
            margin-bottom: 6px;
        }
        .form-group label span.required {
            color: #e74c3c;
            margin-left: 2px;
        }
        .input-wrapper {
            position: relative;
        }
        .input-wrapper input {
            width: 100%;
            padding: 12px 42px 12px 14px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
            transition: all 0.3s;
            color: #333;
        }
        .input-wrapper input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.15);
        }
        .input-wrapper input.error-field {
            border-color: #e74c3c;
        }
        .input-wrapper input.error-field:focus {
            box-shadow: 0 0 0 3px rgba(231,76,60,0.15);
        }
        .toggle-password {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            font-size: 18px;
            color: #aaa;
            user-select: none;
            transition: color 0.2s;
        }
        .toggle-password:hover {
            color: #667eea;
        }
        .field-error {
            color: #e74c3c;
            font-size: 12px;
            margin-top: 5px;
            display: none;
        }
        .field-error.visible {
            display: block;
        }
        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
            margin: 8px 0 16px 0;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            min-height: 50px;
        }
        .login-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102,126,234,0.4);
        }
        .login-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }
        .spinner {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: none;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .alert-box {
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 12px;
            text-align: center;
            display: none;
        }
        .alert-box.error {
            background: #fff2f2;
            border: 1px solid #f5c6cb;
            color: #c0392b;
        }
        .alert-box.success {
            background: #f0fff4;
            border: 1px solid #c3e6cb;
            color: #27ae60;
        }
        .alert-box.visible {
            display: block;
        }
        .footer {
            text-align: center;
            color: #bbb;
            font-size: 12px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <h2>🏦 Credit Society</h2>
            <p>Management System — Secure Login</p>
        </div>

        <div class="role-selector">
            <div class="role-option">
                <input type="radio" id="roleAdmin" name="role" value="Admin" checked>
                <label for="roleAdmin">👑 Admin</label>
            </div>
            <div class="role-option">
                <input type="radio" id="roleMember" name="role" value="Member">
                <label for="roleMember">👤 Member</label>
            </div>
        </div>

        <div id="alertBox" class="alert-box error"></div>

        <div class="form-group">
            <label for="username">Username <span class="required">*</span></label>
            <div class="input-wrapper">
                <input type="text" id="username" placeholder="Enter your username"
                    autocomplete="username" maxlength="50"
                    oninput="clearFieldError('username')">
            </div>
            <div class="field-error" id="usernameError">Username is required.</div>
        </div>

        <div class="form-group">
            <label for="password">Password <span class="required">*</span></label>
            <div class="input-wrapper">
                <input type="password" id="password" placeholder="Enter your password"
                    autocomplete="current-password" maxlength="100"
                    oninput="clearFieldError('password')"
                    onkeydown="handleEnter(event)">
                <span class="toggle-password" onclick="togglePassword()" id="eyeIcon" title="Show/Hide Password">👁️</span>
            </div>
            <div class="field-error" id="passwordError">Password is required.</div>
        </div>

        <button class="login-btn" id="loginBtn" onclick="login()">
            <span class="spinner" id="spinner"></span>
            <span id="btnText">Login</span>
        </button>

        <div class="footer">© 2026 Credit Society Management System</div>
    </div>

    <script>
        function togglePassword() {
            const input = document.getElementById('password');
            const icon  = document.getElementById('eyeIcon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.textContent = '🙈';
            } else {
                input.type = 'password';
                icon.textContent = '👁️';
            }
        }

        function handleEnter(e) {
            if (e.key === 'Enter') login();
        }

        function clearFieldError(fieldId) {
            document.getElementById(fieldId).classList.remove('error-field');
            document.getElementById(fieldId + 'Error').classList.remove('visible');
            hideAlert();
        }

        function showAlert(msg, type = 'error') {
            const box = document.getElementById('alertBox');
            box.textContent = msg;
            box.className = 'alert-box ' + type + ' visible';
        }

        function hideAlert() {
            document.getElementById('alertBox').classList.remove('visible');
        }

        function validate() {
            let valid = true;
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            if (!username) {
                document.getElementById('username').classList.add('error-field');
                document.getElementById('usernameError').textContent = 'Username is required.';
                document.getElementById('usernameError').classList.add('visible');
                valid = false;
            } else if (username.length < 3) {
                document.getElementById('username').classList.add('error-field');
                document.getElementById('usernameError').textContent = 'Username must be at least 3 characters.';
                document.getElementById('usernameError').classList.add('visible');
                valid = false;
            }

            if (!password) {
                document.getElementById('password').classList.add('error-field');
                document.getElementById('passwordError').textContent = 'Password is required.';
                document.getElementById('passwordError').classList.add('visible');
                valid = false;
            } else if (password.length < 4) {
                document.getElementById('password').classList.add('error-field');
                document.getElementById('passwordError').textContent = 'Password must be at least 4 characters.';
                document.getElementById('passwordError').classList.add('visible');
                valid = false;
            }

            return valid;
        }

        function setLoading(isLoading) {
            const btn     = document.getElementById('loginBtn');
            const spinner = document.getElementById('spinner');
            const btnText = document.getElementById('btnText');
            btn.disabled = isLoading;
            spinner.style.display = isLoading ? 'block' : 'none';
            btnText.textContent = isLoading ? 'Logging in...' : 'Login';
        }

        async function login() {
            hideAlert();
            if (!validate()) return;

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const role     = document.querySelector('input[name="role"]:checked').value;

            setLoading(true);

            try {
                const response = await fetch('/api/Auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok) {
                    if (data.role === role) {
                        localStorage.setItem('user', JSON.stringify(data));
                        showAlert('✅ Login successful! Redirecting...', 'success');
                        setTimeout(() => {
                            window.location.href = role === 'Admin' ? '/admin.html' : '/member.html';
                        }, 800);
                    } else {
                        const correctRole = data.role;
                        showAlert('❌ You are registered as "' + correctRole + '". Please select "' + correctRole + '" role.');
                        setLoading(false);
                    }
                } else if (response.status === 401) {
                    showAlert('❌ Incorrect username or password. Please try again.');
                    document.getElementById('password').value = '';
                    setLoading(false);
                } else {
                    showAlert('❌ ' + (data.message || 'Login failed. Please try again.'));
                    setLoading(false);
                }
            } catch (error) {
                showAlert('❌ Cannot connect to server. Please check your connection.');
                setLoading(false);
            }
        }

        window.onload = function () {
            document.getElementById('username').focus();
        };
    </script>
</body>
</html>
