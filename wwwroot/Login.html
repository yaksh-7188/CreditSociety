<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credit Society - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 450px;
            max-width: 90%;
        }
        h2 {
            text-align: center;
            color: #667eea;
            margin-bottom: 30px;
            font-size: 32px;
        }
        .role-selector {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 30px;
        }
        .role-selector label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            padding: 10px 20px;
            border-radius: 10px;
            transition: all 0.3s;
        }
        .role-selector label:hover {
            background: #f0f0f0;
        }
        .input-group {
            margin-bottom: 20px;
        }
        .input-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
            color: #555;
        }
        .input-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s;
        }
        .input-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }
        .input-group input.invalid {
            border-color: #e74c3c;
        }
        .input-group input.valid {
            border-color: #27ae60;
        }
        .validation-msg {
            font-size: 12px;
            margin-top: 5px;
            color: #e74c3c;
            display: none;
        }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin: 20px 0;
            transition: all 0.3s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102,126,234,0.4);
        }
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .footer {
            text-align: center;
            color: #999;
            font-size: 14px;
            margin-top: 20px;
        }
        .message {
            text-align: center;
            padding: 10px;
            border-radius: 8px;
            margin: 10px 0;
            display: none;
        }
        .message.error {
            background: #fee;
            color: #c33;
            display: block;
        }
        .message.success {
            background: #e8f5e9;
            color: #2e7d32;
            display: block;
        }
        .strength-meter {
            height: 4px;
            background: #e0e0e0;
            border-radius: 2px;
            margin-top: 5px;
            overflow: hidden;
        }
        .strength-bar {
            height: 100%;
            width: 0%;
            transition: all 0.3s;
        }
        .strength-bar.weak { background: #e74c3c; width: 33%; }
        .strength-bar.medium { background: #f39c12; width: 66%; }
        .strength-bar.strong { background: #27ae60; width: 100%; }
    </style>
</head>
<body>
    <div class="login-container">
        <h2>🏦 Credit Society</h2>
        
        <div class="role-selector">
            <input type="radio" name="role" id="roleAdmin" value="Admin" checked style="display: none;">
            <label for="roleAdmin">👑 Admin</label>
            
            <input type="radio" name="role" id="roleMember" value="Member" style="display: none;">
            <label for="roleMember">👤 Member</label>
        </div>

        <div class="input-group">
            <label>Username</label>
            <input type="text" id="username" placeholder="Enter your username" onkeyup="validateUsername()">
            <div id="usernameValidation" class="validation-msg"></div>
            <div class="strength-meter" id="usernameStrength" style="display: none;">
                <div class="strength-bar"></div>
            </div>
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Enter your password" onkeyup="validatePassword()">
            <div id="passwordValidation" class="validation-msg"></div>
            <div class="strength-meter">
                <div class="strength-bar" id="passwordStrength"></div>
            </div>
        </div>

        <button onclick="login()" id="loginBtn" disabled>Login</button>
        
        <div id="message" class="message"></div>
        
        <div class="footer">
            © 2026 Credit Society Management System
        </div>
    </div>

    <script>
        function validateUsername() {
            const username = document.getElementById('username').value;
            const msgDiv = document.getElementById('usernameValidation');
            const input = document.getElementById('username');
            
            input.classList.remove('invalid', 'valid');
            msgDiv.style.display = 'none';
            
            if (username.length > 0) {
                const firstChar = username.charAt(0);
                if (firstChar !== firstChar.toUpperCase() || !isNaN(firstChar)) {
                    msgDiv.style.display = 'block';
                    msgDiv.innerText = '❌ First letter must be capital';
                    input.classList.add('invalid');
                    return false;
                }
            }
            
            if (username.length < 4) {
                msgDiv.style.display = 'block';
                msgDiv.innerText = '❌ Username must be at least 4 characters';
                input.classList.add('invalid');
                return false;
            }
            
            if (!/\d/.test(username)) {
                msgDiv.style.display = 'block';
                msgDiv.innerText = '❌ Username must contain at least one number';
                input.classList.add('invalid');
                return false;
            }
            
            input.classList.add('valid');
            return true;
        }
        
        function validatePassword() {
            const password = document.getElementById('password').value;
            const msgDiv = document.getElementById('passwordValidation');
            const input = document.getElementById('password');
            const strengthBar = document.getElementById('passwordStrength');
            
            input.classList.remove('invalid', 'valid');
            msgDiv.style.display = 'none';
            strengthBar.className = 'strength-bar';
            
            if (password.length === 0) return false;
            
            let strength = 0;
            let errors = [];
            
            if (password.length < 6) {
                errors.push('at least 6 characters');
            } else {
                strength++;
            }
            
            if (!/\d/.test(password)) {
                errors.push('one number');
            } else {
                strength++;
            }
            
            if (!/[!@#$%^&*(),.?":{}|<>]/.test(password)) {
                errors.push('one special character');
            } else {
                strength++;
            }
            
            if (errors.length > 0) {
                msgDiv.style.display = 'block';
                msgDiv.innerText = '❌ Password must contain: ' + errors.join(', ');
                input.classList.add('invalid');
                
                if (strength === 1) strengthBar.className = 'strength-bar weak';
                else if (strength === 2) strengthBar.className = 'strength-bar medium';
                return false;
            }
            
            input.classList.add('valid');
            strengthBar.className = 'strength-bar strong';
            return true;
        }
        
        function checkValidations() {
            document.getElementById('loginBtn').disabled = !(validateUsername() && validatePassword());
        }
        
        document.getElementById('username').addEventListener('keyup', checkValidations);
        document.getElementById('password').addEventListener('keyup', checkValidations);
        
        async function login() {
            if (!checkValidations()) return;
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const role = document.querySelector('input[name="role"]:checked').value;
            const messageDiv = document.getElementById('message');
            const loginBtn = document.getElementById('loginBtn');

            messageDiv.className = 'message';
            messageDiv.style.display = 'none';
            loginBtn.disabled = true;
            loginBtn.innerText = 'Logging in...';

            try {
                const response = await fetch('/api/Auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok) {
                    if (data.role === role) {
                        localStorage.setItem('user', JSON.stringify(data));
                        messageDiv.className = 'message success';
                        messageDiv.innerText = '✅ Login successful! Redirecting...';
                        messageDiv.style.display = 'block';
                        setTimeout(() => {
                            window.location.href = role === 'Admin' ? '/admin.html' : '/member.html';
                        }, 1000);
                    } else {
                        messageDiv.className = 'message error';
                        messageDiv.innerText = '❌ Wrong role selected!';
                        messageDiv.style.display = 'block';
                        loginBtn.disabled = false;
                        loginBtn.innerText = 'Login';
                    }
                } else {
                    messageDiv.className = 'message error';
                    messageDiv.innerText = '❌ Invalid credentials!';
                    messageDiv.style.display = 'block';
                    loginBtn.disabled = false;
                    loginBtn.innerText = 'Login';
                }
            } catch (error) {
                messageDiv.className = 'message error';
                messageDiv.innerText = '❌ Server error!';
                messageDiv.style.display = 'block';
                loginBtn.disabled = false;
                loginBtn.innerText = 'Login';
            }
        }

        document.getElementById('password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && !document.getElementById('loginBtn').disabled) {
                login();
            }
        });
    </script>
</body>
</html>
