<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credit Society - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 400px;
            max-width: 90%;
            animation: slideUp 0.5s ease;
        }
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        h2 {
            text-align: center;
            color: #667eea;
            margin-bottom: 30px;
            font-size: 32px;
            font-weight: 600;
        }
        .role-selector {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
        }
        .role-selector label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            padding: 12px 30px;
            border-radius: 50px;
            transition: all 0.3s;
            background: #f8f9fa;
            border: 2px solid transparent;
            font-weight: 500;
        }
        .role-selector label:hover {
            background: #e9ecef;
        }
        .role-selector input[type="radio"] {
            display: none;
        }
        .role-selector input[type="radio"]:checked + label {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: transparent;
        }
        .input-group {
            margin-bottom: 20px;
        }
        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }
        .input-group input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s;
        }
        .input-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }
        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin: 20px 0;
            transition: all 0.3s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102,126,234,0.4);
        }
        .footer {
            text-align: center;
            color: #999;
            font-size: 14px;
            margin-top: 20px;
        }
        .message {
            text-align: center;
            padding: 10px;
            border-radius: 8px;
            margin: 10px 0;
            display: none;
        }
        .message.error {
            background: #fee;
            color: #c33;
            display: block;
        }
        .message.success {
            background: #e8f5e9;
            color: #2e7d32;
            display: block;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h2>🏦 Credit Society</h2>
        
        <div class="role-selector">
            <input type="radio" name="role" id="roleAdmin" value="Admin" checked>
            <label for="roleAdmin">👑 Admin</label>
            
            <input type="radio" name="role" id="roleMember" value="Member">
            <label for="roleMember">👤 Member</label>
        </div>

        <div class="input-group">
            <label>Username</label>
            <input type="text" id="username" placeholder="Enter your username">
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Enter your password">
        </div>

        <button onclick="login()">Login</button>
        
        <div id="message" class="message"></div>
        
        <div class="footer">
            © 2026 Credit Society Management System
        </div>
    </div>

    <script>
        async function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const role = document.querySelector('input[name="role"]:checked').value;
            const messageDiv = document.getElementById('message');

            if (!username || !password) {
                messageDiv.className = 'message error';
                messageDiv.innerText = '❌ Please enter username and password';
                return;
            }

            try {
                const response = await fetch('/api/Auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok) {
                    if (data.role === role) {
                        localStorage.setItem('user', JSON.stringify(data));
                        messageDiv.className = 'message success';
                        messageDiv.innerText = '✅ Login successful! Redirecting...';
                        setTimeout(() => {
                            window.location.href = role === 'Admin' ? '/admin.html' : '/member.html';
                        }, 1000);
                    } else {
                        messageDiv.className = 'message error';
                        messageDiv.innerText = '❌ Wrong role selected!';
                    }
                } else {
                    messageDiv.className = 'message error';
                    messageDiv.innerText = '❌ Invalid credentials!';
                }
            } catch (error) {
                messageDiv.className = 'message error';
                messageDiv.innerText = '❌ Server error!';
            }
        }

        // Enter key press
        document.getElementById('password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                login();
            }
        });
    </script>
</body>
</html>
