<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credit Society Management System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        
        /* Animated Background */
        body::before {
            content: '';
            position: absolute;
            width: 2000px;
            height: 2000px;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.05) 100%);
            top: -10%;
            right: -20%;
            animation: float 20s infinite ease-in-out;
        }
        
        body::after {
            content: '';
            position: absolute;
            width: 1500px;
            height: 1500px;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0.03) 100%);
            bottom: -10%;
            left: -20%;
            animation: float 25s infinite ease-in-out reverse;
        }
        
        @keyframes float {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(50px, -50px) rotate(120deg); }
            66% { transform: translate(-30px, 30px) rotate(240deg); }
        }
        
        /* Main Container */
        .container {
            width: 100%;
            max-width: 1200px;
            padding: 20px;
            position: relative;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        /* Login Card */
        .login-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 450px;
            overflow: hidden;
            transform: translateY(0);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            animation: slideUp 0.6s ease-out;
        }
        
        .login-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.4);
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* Header */
        .login-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 40px 30px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        
        .login-header::before {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            top: -150px;
            right: -150px;
            animation: pulse 4s infinite;
        }
        
        .login-header::after {
            content: '';
            position: absolute;
            width: 200px;
            height: 200px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 50%;
            bottom: -100px;
            left: -100px;
            animation: pulse 4s infinite 1s;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.1; }
            50% { transform: scale(1.1); opacity: 0.15; }
        }
        
        .login-header h1 {
            color: white;
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 10px;
            letter-spacing: 1px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
            position: relative;
            z-index: 1;
        }
        
        .login-header p {
            color: rgba(255, 255, 255, 0.9);
            font-size: 16px;
            font-weight: 300;
            letter-spacing: 0.5px;
            position: relative;
            z-index: 1;
        }
        
        .login-header .icon {
            font-size: 50px;
            color: white;
            margin-bottom: 15px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
            animation: bounce 2s infinite;
            position: relative;
            z-index: 1;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        /* Body */
        .login-body {
            padding: 40px 30px;
            background: white;
        }
        
        /* Role Selector */
        .role-selector {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 25px;
            border: 2px solid transparent;
            transition: all 0.3s ease;
        }
        
        .role-selector:hover {
            border-color: #667eea;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.2);
        }
        
        .role-label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #555;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .role-options {
            display: flex;
            gap: 30px;
            justify-content: center;
        }
        
        .role-option {
            flex: 1;
            text-align: center;
        }
        
        .role-option input[type="radio"] {
            display: none;
        }
        
        .role-option label {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px;
            background: white;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid #e0e0e0;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
        }
        
        .role-option input[type="radio"]:checked + label {
            border-color: #667eea;
            background: linear-gradient(135deg, #f5f7ff 0%, #eef2ff 100%);
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.2);
        }
        
        .role-option label i {
            font-size: 28px;
            margin-bottom: 8px;
            color: #667eea;
        }
        
        .role-option label span {
            font-size: 14px;
            font-weight: 600;
            color: #555;
        }
        
        .role-option input[type="radio"]:checked + label i,
        .role-option input[type="radio"]:checked + label span {
            color: #667eea;
        }
        
        /* Input Groups */
        .input-group {
            margin-bottom: 20px;
            position: relative;
        }
        
        .input-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #555;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }
        
        .input-wrapper i {
            position: absolute;
            left: 15px;
            color: #999;
            font-size: 18px;
            transition: color 0.3s ease;
        }
        
        .input-wrapper input {
            width: 100%;
            padding: 15px 15px 15px 45px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 15px;
            transition: all 0.3s ease;
            background: white;
        }
        
        .input-wrapper input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.2);
        }
        
        .input-wrapper input:focus + i {
            color: #667eea;
        }
        
        .input-wrapper .toggle-password {
            position: absolute;
            right: 15px;
            left: auto;
            cursor: pointer;
            color: #999;
            transition: color 0.3s ease;
        }
        
        .input-wrapper .toggle-password:hover {
            color: #667eea;
        }
        
        /* Remember & Forgot */
        .options-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 20px 0 25px;
        }
        
        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }
        
        .remember-me input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #667eea;
        }
        
        .remember-me span {
            color: #666;
            font-size: 14px;
        }
        
        .forgot-password {
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: color 0.3s ease;
        }
        
        .forgot-password:hover {
            color: #764ba2;
            text-decoration: underline;
        }
        
        /* Login Button */
        .login-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }
        
        .login-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }
        
        .login-btn:hover::before {
            width: 300px;
            height: 300px;
        }
        
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }
        
        .login-btn:active {
            transform: translateY(0);
        }
        
        .login-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }
        
        /* Message */
        .message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            font-size: 14px;
            font-weight: 500;
            animation: slideDown 0.3s ease;
        }
        
        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .message.error {
            background: #fee;
            color: #c33;
            border-left: 4px solid #c33;
        }
        
        .message.success {
            background: #e8f5e9;
            color: #2e7d32;
            border-left: 4px solid #2e7d32;
        }
        
        .message.info {
            background: #e3f2fd;
            color: #1565c0;
            border-left: 4px solid #1565c0;
        }
        
        /* Footer */
        .login-footer {
            margin-top: 25px;
            text-align: center;
            color: #999;
            font-size: 13px;
        }
        
        .login-footer a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
        }
        
        .login-footer a:hover {
            text-decoration: underline;
        }
        
        /* Loading Spinner */
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            margin-right: 8px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* Demo Credentials */
        .demo-credentials {
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            font-size: 13px;
            color: #666;
            border: 1px dashed #667eea;
        }
        
        .demo-credentials p {
            margin-bottom: 5px;
            font-weight: 600;
            color: #667eea;
        }
        
        .demo-credentials small {
            display: block;
            margin-bottom: 3px;
        }
        
        .demo-credentials i {
            color: #667eea;
            margin-right: 5px;
        }
        
        /* Responsive */
        @media (max-width: 480px) {
            .login-card {
                margin: 10px;
            }
            
            .login-header {
                padding: 30px 20px;
            }
            
            .login-header h1 {
                font-size: 24px;
            }
            
            .login-body {
                padding: 30px 20px;
            }
            
            .role-options {
                flex-direction: column;
                gap: 15px;
            }
            
            .role-option {
                width: 100%;
            }
            
            .options-row {
                flex-direction: column;
                gap: 15px;
                align-items: flex-start;
            }
        }
    </style>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="login-card">
            <div class="login-header">
                <div class="icon">
                    <i class="fas fa-hand-holding-heart"></i>
                </div>
                <h1>Credit Society</h1>
                <p>Manage your finances with ease</p>
            </div>
            
            <div class="login-body">
                <!-- Role Selection -->
                <div class="role-selector">
                    <span class="role-label">Select Your Role</span>
                    <div class="role-options">
                        <div class="role-option">
                            <input type="radio" name="role" id="roleAdmin" value="Admin" checked>
                            <label for="roleAdmin">
                                <i class="fas fa-user-tie"></i>
                                <span>Admin</span>
                            </label>
                        </div>
                        <div class="role-option">
                            <input type="radio" name="role" id="roleMember" value="Member">
                            <label for="roleMember">
                                <i class="fas fa-user"></i>
                                <span>Member</span>
                            </label>
                        </div>
                    </div>
                </div>
                
                <!-- Username -->
                <div class="input-group">
                    <label><i class="fas fa-user-circle"></i> Username</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user"></i>
                        <input type="text" id="username" placeholder="Enter your username" value="admin" autocomplete="off">
                    </div>
                </div>
                
                <!-- Password -->
                <div class="input-group">
                    <label><i class="fas fa-lock"></i> Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" placeholder="Enter your password" value="admin123">
                        <i class="fas fa-eye toggle-password" onclick="togglePassword()" id="toggleIcon"></i>
                    </div>
                </div>
                
                <!-- Options -->
                <div class="options-row">
                    <label class="remember-me">
                        <input type="checkbox" id="remember"> 
                        <span>Remember me</span>
                    </label>
                    <a href="#" class="forgot-password">Forgot Password?</a>
                </div>
                
                <!-- Login Button -->
                <button class="login-btn" onclick="login()" id="loginBtn">
                    <span class="btn-text">Login</span>
                </button>
                
                <!-- Message Container -->
                <div id="message" class="message" style="display: none;"></div>
                
                <!-- Demo Credentials -->
                <div class="demo-credentials">
                    <p><i class="fas fa-info-circle"></i> Demo Credentials</p>
                    <small><i class="fas fa-user-tie"></i> Admin: admin / admin123</small>
                    <small><i class="fas fa-user"></i> Member: john / john123</small>
                    <small><i class="fas fa-user"></i> Member: jane / jane123</small>
                </div>
                
                <!-- Footer -->
                <div class="login-footer">
                    &copy; 2026 Credit Society Management System. All rights reserved.
                </div>
            </div>
        </div>
    </div>

    <script>
        // Toggle password visibility
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const toggleIcon = document.getElementById('toggleIcon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.classList.remove('fa-eye');
                toggleIcon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                toggleIcon.classList.remove('fa-eye-slash');
                toggleIcon.classList.add('fa-eye');
            }
        }

        // Show message function
        function showMessage(text, type = 'error') {
            const messageDiv = document.getElementById('message');
            messageDiv.style.display = 'block';
            messageDiv.className = `message ${type}`;
            messageDiv.innerHTML = text;
            
            // Auto hide after 5 seconds
            setTimeout(() => {
                messageDiv.style.display = 'none';
            }, 5000);
        }

        // Login function
        async function login() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const role = document.querySelector('input[name="role"]:checked').value;
            const remember = document.getElementById('remember').checked;
            
            // Validation
            if (!username || !password) {
                showMessage('Please enter username and password', 'error');
                return;
            }
            
            // Show loading
            const loginBtn = document.getElementById('loginBtn');
            const originalText = loginBtn.innerHTML;
            loginBtn.innerHTML = '<span class="spinner"></span> Logging in...';
            loginBtn.disabled = true;
            
            try {
                console.log('Attempting login with:', { username, password, role });
                
                const response = await fetch('/api/Auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                console.log('Login response:', data);
                
                if (response.ok) {
                    // Check role match
                    if (data.role === role) {
                        // Store user data
                        const userData = {
                            userId: data.userId,
                            username: data.username,
                            fullName: data.fullName,
                            role: data.role
                        };
                        
                        if (remember) {
                            localStorage.setItem('user', JSON.stringify(userData));
                            localStorage.setItem('userId', data.userId);
                        } else {
                            sessionStorage.setItem('user', JSON.stringify(userData));
                            sessionStorage.setItem('userId', data.userId);
                        }
                        
                        showMessage('Login successful! Redirecting...', 'success');
                        
                        // Redirect based on role
                        setTimeout(() => {
                            if (data.role === 'Admin') {
                                window.location.href = '/admin.html';
                            } else {
                                window.location.href = '/member.html';
                            }
                        }, 1000);
                    } else {
                        showMessage(`Role mismatch! You are not a ${role}`, 'error');
                        loginBtn.innerHTML = originalText;
                        loginBtn.disabled = false;
                    }
                } else {
                    showMessage(data.message || 'Invalid credentials', 'error');
                    loginBtn.innerHTML = originalText;
                    loginBtn.disabled = false;
                }
            } catch (error) {
                console.error('Login error:', error);
                showMessage('Server connection failed. Please try again.', 'error');
                loginBtn.innerHTML = originalText;
                loginBtn.disabled = false;
            }
        }

        // Enter key press
        document.getElementById('password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                login();
            }
        });

        document.getElementById('username').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                document.getElementById('password').focus();
            }
        });

        // Check for saved credentials
        window.onload = function() {
            const savedUser = localStorage.getItem('user');
            if (savedUser) {
                const user = JSON.parse(savedUser);
                document.getElementById('username').value = user.username || '';
                document.getElementById('remember').checked = true;
            }
            
            // Add floating animation to card
            document.querySelector('.login-card').style.animation = 'slideUp 0.6s ease-out';
        };
    </script>
</body>
</html>
